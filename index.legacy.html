                                </div>
                            )}

                        </div>
                    </div>

                    {/* Confirm Modal */}
                    {confirmState.open && (
                        <div className="modal-overlay">
                            <div className="outset w-[320px] p-4 flex flex-col gap-3">
                                <div className="sidebar-title" style={{margin: '-4px -4px 10px -4px'}}>确认操作</div>
                                <div>{confirmState.message}</div>
                                <div className="flex justify-end gap-2 mt-2">
                                    <button className="win-button font-bold" onClick={executeConfirm}>确定</button>
                                    <button className="win-button" onClick={closeConfirm}>取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Rename Session Modal */}
                    {renamingSessionId && (
                        <div className="modal-overlay">
                            <div className="outset w-[300px] p-4 flex flex-col gap-3">
                                <div className="sidebar-title" style={{margin: '-4px -4px 10px -4px'}}>重命名会话</div>
                                <input
                                    className="w-full"
                                    value={renameInput}
                                    onChange={e => setRenameInput(e.target.value)}
                                    autoFocus
                                    onKeyDown={e => { if (e.key === 'Enter') handleRenameSave(); }}
                                />
                                <div className="flex justify-end gap-2 mt-2">
                                    <button className="win-button font-bold" onClick={handleRenameSave}>确定</button>
                                    <button className="win-button" onClick={() => setRenamingSessionId(null)}>取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Agent Edit Modal */}
                    {editingAgent && (
                        <div className="modal-overlay">
                            <div className="outset w-[500px] p-4 flex flex-col gap-3">
                                <div className="sidebar-title" style={{margin: '-4px -4px 10px -4px'}}>编辑 Agent 配置</div>
                                <div>
                                    <label className="block text-xs font-bold mb-1">名称</label>
                                    <input className="w-full" value={editingAgent.name} onChange={e => setEditingAgent({...editingAgent, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold mb-1">简介</label>
                                    <input className="w-full" value={editingAgent.desc} onChange={e => setEditingAgent({...editingAgent, desc: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold mb-1">自定义职责（Instructions / agent.md）</label>
                                    <textarea className="w-full h-40 font-mono text-xs" value={editingAgent.instructions} onChange={e => setEditingAgent({...editingAgent, instructions: e.target.value})} />
                                </div>
                                <div className="flex justify-end gap-2 mt-2">
                                    <button className="win-button font-bold" onClick={() => handleSaveAgent(editingAgent)}>保存</button>
                                    <button className="win-button" onClick={() => setEditingAgent(null)}>取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
